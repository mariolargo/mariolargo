name: Release
on:
  push:
    branches:
      - develop

jobs:
  release:
    name: Run Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches history for all tags and commits

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
